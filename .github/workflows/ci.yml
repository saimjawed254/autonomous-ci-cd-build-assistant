name: CI Build with AI Diagnostics

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Run Checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # -------------------------------------------------------------
      # DEMONSTRATION STEP:
      # This step intentionally fails under PR events to show the AI
      # Build Assistant diagnosing the failure and attempting fix.
      # -------------------------------------------------------------
      - name: Run Tests
        id: test_step
        run: |
          # Run validation smoke tests
          python unwanted/week2-validation/validate_week2.py
          
          # Simulate build failure on pull requests
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "====================== FAILURES ======================"
            echo "FAILED tests/test_parser.py::test_parse_empty_log - AssertionError: expected empty output"
            echo "Error: Process completed with exit code 1."
            exit 1
          fi

      # -------------------------------------------------------------
      # SAVE LOG ON FAILURE:
      # Captures stdout/stderr from the failed step into a log file.
      # -------------------------------------------------------------
      - name: Save Log on Failure
        if: failure() && steps.test_step.outcome == 'failure'
        run: |
          echo "FAILED tests/test_parser.py::test_parse_empty_log - AssertionError: expected empty output" > build_failure.log
          echo "Error: Process completed with exit code 1." >> build_failure.log

      # -------------------------------------------------------------
      # RUN AI BUILD ASSISTANT:
      # Automatically triggers when the build fails, reads the log,
      # diagnoses the issue, writes a comment on the PR, and triggers re-run.
      # -------------------------------------------------------------
      - name: Run AI Build Assistant
        if: failure()
        uses: ./
        with:
          log-file: 'build_failure.log'
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          mode: 'agent'
          github-token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
