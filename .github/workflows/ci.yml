name: CI Build with AI Diagnostics

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Run Checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # -------------------------------------------------------------
      # RUN TESTS:
      # Validates that all modules import correctly and runs linting.
      # Output is captured so the AI Build Assistant can analyze on failure.
      # -------------------------------------------------------------
      - name: Run Tests
        id: test_step
        run: |
          set -o pipefail
          {
            echo "=== Module Import Check ==="
            python -c "from src.ci_build_assistant import parser, schema, config, analysis, agent; print('All modules imported successfully')"
            echo ""
            echo "=== Linting with Ruff ==="
            ruff check src/ assistant.py --output-format text
            echo ""
            echo "All checks passed."
          } 2>&1 | tee build_failure.log

      # -------------------------------------------------------------
      # RUN AI BUILD ASSISTANT:
      # Diagnoses the issue and writes a comment on the PR.
      # Re-run is handled separately by retry.yml.
      # -------------------------------------------------------------
      - name: Run AI Build Assistant
        if: failure()
        uses: ./
        with:
          log-file: 'build_failure.log'
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          mode: 'agent'

