name: 'AI-Powered CI/CD Build Assistant'
description: 'Diagnoses build failures from pipeline logs and triggers recovery attempts autonomously.'
author: 'Google DeepMind Pair Programming'
branding:
  icon: 'terminal'
  color: 'blue'

inputs:
  log-file:
    description: 'Path to the build log file to analyze'
    required: true
  gemini-api-key:
    description: 'API key for Google AI Studio'
    required: true
  gemini-model:
    description: 'Gemini model identifier'
    required: false
    default: 'gemini-3.1-flash-lite'
  mode:
    description: 'Execution mode: "diagnose" (outputs dashboard report) or "agent" (attempts autonomous re-runs)'
    required: false
    default: 'agent'
  github-token:
    description: 'GitHub token for PR commenting and API access'
    required: false
    default: '${{ github.token }}'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f "${{ github.action_path }}/requirements.txt" ]; then
          python -m pip install -r "${{ github.action_path }}/requirements.txt"
        fi

    - name: Run Build Assistant
      shell: bash
      run: |
        export GEMINI_API_KEY="${{ inputs.gemini-api-key }}"
        export GEMINI_MODEL="${{ inputs.gemini-model }}"
        export GITHUB_TOKEN="${{ inputs.github-token }}"
        export GITHUB_REPOSITORY="${{ github.repository }}"
        export GITHUB_RUN_ID="${{ github.run_id }}"
        
        # Pull Request event extraction
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          export GITHUB_PR_NUMBER="${{ github.event.number }}"
        fi
        
        python "${{ github.action_path }}/assistant.py" "${{ inputs.log-file }}" --mode "${{ inputs.mode }}"
